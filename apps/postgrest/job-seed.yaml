apiVersion: batch/v1
kind: Job
metadata:
  name: postgrest-seed
  namespace: postgrest
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: postgrest-admin
          command:
            - /bin/sh
            - -ceu
            - |
              export PGPASSWORD="${POSTGRES_PASSWORD}"

              cat >/tmp/seed.sql <<SQL
              create table if not exists api.todos (
                id bigint primary key generated by default as identity,
                done boolean not null default false,
                task text not null unique,
                due timestamptz
              );

              alter table api.todos owner to ${POSTGRES_SCHEMA_OWNER};

              grant usage on schema api to ${POSTGREST_ANON_ROLE};
              grant select on api.todos to ${POSTGREST_ANON_ROLE};

              insert into api.todos (task, done, due) values
                ('review the take-home solution', false, null),
                ('bootstrap k3d with opentofu', true, null),
                ('deploy postgrest through argocd', false, null)
              on conflict (task) do nothing;

              NOTIFY pgrst, 'reload schema';
              SQL

              psql \
                -v ON_ERROR_STOP=1 \
                -h host.k3d.internal \
                -U "${POSTGRES_USER}" \
                -d "${POSTGRES_DB}" \
                -f /tmp/seed.sql
