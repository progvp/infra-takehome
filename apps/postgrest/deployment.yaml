apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: postgrest
  labels:
    app.kubernetes.io/name: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgrest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgrest
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:v14.6
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: postgrest-runtime
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
